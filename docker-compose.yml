services:
  db:
    image: mysql:8.0
    container_name: infrasentinel-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-monitoring}
      MYSQL_USER: ${MYSQL_USER:-monitor_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-monitor_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infrasentinel-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infrasentinel-backend
    restart: always
    pid: host
    privileged: true
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-monitor_user}:${MYSQL_PASSWORD:-monitor_pass}@db:3306/${MYSQL_DATABASE:-monitoring}
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      HOST_PROC: /host/proc
      HOST_SYS: /host/sys
      HOST_ROOT: /host/root
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - infrasentinel-network

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: infrasentinel-worker
    restart: always
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-monitor_user}:${MYSQL_PASSWORD:-monitor_pass}@db:3306/${MYSQL_DATABASE:-monitoring}
      CPU_ALERT_THRESHOLD: ${CPU_ALERT_THRESHOLD:-80}
      MEMORY_ALERT_THRESHOLD: ${MEMORY_ALERT_THRESHOLD:-80}
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - infrasentinel-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: infrasentinel-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - infrasentinel-network

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: infrasentinel-jenkins:latest
    container_name: infrasentinel-jenkins
    restart: always
    privileged: true
    user: root
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./jenkins/casc.yaml:/var/jenkins_home/casc.yaml:ro
      - ./:/workspace:ro
    ports:
      - "8080:8080"
      - "50000:50000"
    networks:
      - infrasentinel-network

  sonarqube:
    image: sonarqube:10.4-community
    container_name: infrasentinel-sonarqube
    restart: always
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonar
      - SONAR_JDBC_USERNAME=${SONAR_DB_USER:-sonar}
      - SONAR_JDBC_PASSWORD=${SONAR_DB_PASSWORD:-sonar123}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    depends_on:
      sonarqube-db:
        condition: service_healthy
    networks:
      - infrasentinel-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  sonarqube-db:
    image: postgres:15-alpine
    container_name: infrasentinel-sonarqube-db
    restart: always
    environment:
      - POSTGRES_USER=${SONAR_DB_USER:-sonar}
      - POSTGRES_PASSWORD=${SONAR_DB_PASSWORD:-sonar123}
      - POSTGRES_DB=sonar
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    networks:
      - infrasentinel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SONAR_DB_USER:-sonar}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  infrasentinel-network:
    driver: bridge

volumes:
  mysql_data:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_db:
