# SonarQube Project Configuration for InfraSentinel

# Project identification
sonar.projectKey=infrasentinel
sonar.projectName=InfraSentinel
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=backend/app,frontend/static/js,worker
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/venv/**,**/.pytest_cache/**,**/dist/**,**/build/**

# Python-specific settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.pylint.reportPaths=pylint-report.txt

# JavaScript-specific settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test files
sonar.tests=backend/tests,frontend/tests
sonar.test.inclusions=**/*test*.py,**/*spec.js,**/*test.js

# Encoding
sonar.sourceEncoding=UTF-8

# Security analysis
sonar.security.hotspots.includeInShortLists=true

# Code coverage exclusions
sonar.coverage.exclusions=**/tests/**,**/test_*.py,**/*_test.py,**/__init__.py,**/config.py

# Duplication
sonar.cpd.exclusions=**/models.py,**/schemas.py

# Issues to ignore
sonar.issue.ignore.multicriteria=e1,e2

# Ignore TODO comments as issues
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1135
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.py

# Ignore print statements (we use them for Docker logs)
sonar.issue.ignore.multicriteria.e2.ruleKey=python:PrintStatementUsed
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.py
